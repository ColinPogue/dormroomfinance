baseURL = "https://dormroomfinance.com/"
languageCode = "en-us"
title = "Dorm Room Finance"
theme = "PaperMod"
paginate = 5

[params]
  env = "production"
  title = "Dorm Room Finance"
  description = "Real money advice from a real college student. Budgeting, investing, credit cards, and side hustles — written by a 21-year-old junior figuring it out."
  keywords = ["college finance", "student money", "budgeting in college", "investing for college students", "student credit cards"]
  author = "Colin"
  DateFormat = "January 2, 2006"
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Real money advice for college students."
    Content = "No jargon, no fluff. Just what you actually need to know about credit, investing, budgeting, and building a financial foundation before graduation — written by a business student figuring it out in real time."

  [[params.socialIcons]]
    name = "email"
    url = "mailto:cpogue208@gmail.com"

[taxonomies]
  category = "categories"
  tag = "tags"

[menu]
  [[menu.main]]
    identifier = "articles"
    name = "Articles"
    url = "/articles/"
    weight = 10
  [[menu.main]]
    identifier = "categories"
    name = "Categories"
    url = "/categories/"
    weight = 20
  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 30
  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "mailto:cpogue208@gmail.com"
    weight = 40

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
